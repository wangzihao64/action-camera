version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: action_camera_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: action_camera
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - action_camera_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:latest
    container_name: action_camera_redis
    ports:
      - "6379:6379"
    networks:
      - action_camera_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 应用服务
  app:
    build: .
    container_name: action_camera_app
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - action_camera_network
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=mysql
      - REDIS_HOST=redis

networks:
  action_camera_network:
    driver: bridge

volumes:
  mysql_data:
